server_addr: "10.54.56.88:50051"
host_id: "server-001"
hostname: "server-001"
collect_interval: 10
manual_ip: "10.54.56.88"  # 手动指定IP
debug: false

grpc:
  connect_timeout: 20
  register_timeout: 20
  report_timeout: 10
  heartbeat_timeout: 5
  request_timeout: 20

fallback:
  http_enabled: true
  http_base_url: "http://10.54.56.88:8080"
  cache_enabled: true
  cache_dir: "./agent-cache"
  max_cache_files: 1000

#服务端口监控
service_ports:
  - name: "nginx"
    port: 8081
    host: "localhost"  # 可选，默认为 localhost
    description: "Nginx Web服务器"
  - name: "mysql"
    port: 3306
    host: "localhost"
    description: "MySQL数据库"
  - name: "redis"
    port: 6379
    description: "Redis缓存"
